<head>

            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;

            max-width: 650px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
            text-align: right;
            font-weight: bold;
        }
        .question {
            font-size: 1.15rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-label {
            background-color: #f8f9fa;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 1rem;
            color: #495057;
        }
        .option-label:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }
        .option-label input {
            margin-right: 12px;
            transform: scale(1.2);
            pointer-events: none;
        }
        /* Real-time Feedback Classes */
        .option-label.correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724 !important;
            font-weight: bold;
        }
        .option-label.wrong {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24 !important;
        }
        .option-label.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #next-btn, #submit-btn {
            background-color: #2ecc71;
            color: white;
        }
        #next-btn:hover, #submit-btn:hover {
            background-color: #27ae60;
        }
        #prev-btn {
            background-color: #95a5a6;
            color: white;
        }
        #prev-btn:hover {
            background-color: #7f8c8d;
        }
        #result-container {
            text-align: center;
        }
        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #2ecc71;
            margin: 20px 0;
        }
        .restart-btn {
            background-color: #3498db;
            color: white;
        }
        .restart-btn:hover {
            background-color: #2980b9;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <div class="progress" id="progress">Question 1 of 100</div>

        <div class="buttons">

            <button id="next-btn" onclick="nextQuestion()">Next</button>
            <button id="submit-btn" class="hide" onclick="showResults()">Submit Exam</button>
        </div>
    </div>

        <div class="score-display" id="score-text">0 / 100</div>

        <button class="restart-btn" onclick="restartQuiz()">Restart Exam</button>
    </div>
</div>

                }
            });

            label.appendChild(radio);
            label.appendChild(document.createTextNode(option));
            optionsContainerEl.appendChild(label);
        });

        prevBtn.disabled = currentQuestionIndex === 0;

        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.classList.add('hide');
            submitBtn.classList.remove('hide');
        } else {
            nextBtn.classList.remove('hide');
            submitBtn.classList.add('hide');
        }
    }

    function selectOption(selectedIndex, selectedLabel) {
        const currentQuestion = quizData[currentQuestionIndex];
        userAnswers[currentQuestionIndex] = selectedIndex;

        const allLabels = optionsContainerEl.querySelectorAll('.option-label');
        allLabels.forEach((label, index) => {
            label.classList.add('disabled'); // Disable clicking after selection
            if (index === currentQuestion.c) {
                label.classList.add('correct'); // Turn correct option green
            }
        });

        if (selectedIndex !== currentQuestion.c) {
            selectedLabel.classList.add('wrong'); // Turn wrong option red
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function showResults() {
        score = 0;
        quizData.forEach((question, index) => {
            if (userAnswers[index] === question.c) {
                score++;
            }
        });

        quizBox.classList.add('hide');
        resultContainer.classList.remove('hide');
        scoreTextEl.innerText = `${score} / ${quizData.length}`;

        if (score >= 85) {
            feedbackTextEl.innerText = "Excellent! You have standard clinical mastery of Pharmacology!";
        } else if (score >= 70) {
            feedbackTextEl.innerText = "Good job! You passed the assessment successfully.";
        } else {
            feedbackTextEl.innerText = "Review the incorrect topics and try again to build clinical competence.";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        userAnswers = new Array(quizData.length).fill(null);
        resultContainer.classList.add('hide');
        quizBox.classList.remove('hide');
        loadQuestion();
    }

    // Initialize Quiz Setup
    loadQuestion();
</script>

</body>
</html>
